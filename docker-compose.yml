version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: bbb-ct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bbb_ct_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bbb_ct_pg_data:/var/lib/postgresql/data
volumes:
  bbb_ct_pg_data:
