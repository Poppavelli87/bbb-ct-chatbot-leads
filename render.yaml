services:
  - type: web
    name: bbb-ct-chatbot-leads
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm db:migrate
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bbb-ct-chatbot-db
          property: connectionString
      - key: PUBLIC_APP_URL
        value: https://bbb-ct-chatbot-leads.onrender.com
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEAL_PRIVATE_KEY_PEM
        sync: false
      - key: SEAL_PUBLIC_KEY_PEM
        sync: false
      - key: SEAL_KEY_ID
        value: k1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: bbb-ct-chatbot-db
    plan: starter
    databaseName: bbb_ct_chatbot
    user: bbb_ct_user
